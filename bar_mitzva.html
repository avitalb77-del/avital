<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">

<style>
  .mybook-albums-wrap {
    font-family: 'Assistant', sans-serif;
    width: 100vw;
    max-width: 100vw;
    margin-right: calc(50% - 50vw);
    margin-left: calc(50% - 50vw);
    padding: 0 20px;
    box-sizing: border-box;
    text-align: center;
  }

  .mybook-album-block {
    width: 100%;
    max-width: 1100px;
    margin: 0 auto 55px auto;
  }

  .mybook-album-title {
    font-family: 'Assistant', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #111;
  }

  .mybook-album-subtitle {
    font-family: 'Assistant', sans-serif;
    font-size: 14px;
    color: #888;
    margin-bottom: 16px;
  }

  .mybook-frame-wrap {
    width: 100%;
    max-width: 1100px;
    height: 680px;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 10px;
    background: #fff;
    position: relative;
  }

  .mybook-frame-wrap iframe {
    position: absolute;
    top: -3px;
    left: -3px;
    width: calc(100% + 6px);
    height: calc(100% + 6px);
    border: none;
    display: block;
  }

  .mybook-buy-btn {
    margin-top: 16px;
    padding: 12px 26px;
    font-family: 'Assistant', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: #7ebdc2;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .mybook-buy-btn:hover {
    opacity: 0.92;
  }

  @media (max-width: 1024px) {
    .mybook-frame-wrap {
      height: 560px;
    }
  }

  @media (max-width: 767px) {
    .mybook-albums-wrap {
      padding: 0 12px;
    }

    .mybook-album-title {
      font-size: 19px;
    }

    .mybook-frame-wrap {
      height: 420px;
      border-radius: 8px;
    }

    .mybook-buy-btn {
      width: 100%;
      max-width: 280px;
      font-size: 15px;
    }
  }
</style>
